        - name: Deploy to EC2
          uses: appleboy/ssh-action@v1.0.0
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              # 1. Log in (optional, but good if the repo is private)
              # docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
              
              # 2. Pull the LATEST version from Docker Hub (Replace 'your-username'!)
              docker pull your-actual-username/devops-app:latest
              
              # 3. Stop and remove the old container so the port is free
              docker stop app || true
              docker rm app || true
              
              # 4. Run the new container
              docker run -d -p 8080:8080 --name app your-actual-username/devops-app:latest
              
              # 5. Optional: Remove old, unused images to save disk space
              docker image prune -f




